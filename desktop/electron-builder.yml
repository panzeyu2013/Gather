appId: com.gather.desktop
productName: Gather
directories:
  output: release
  buildResources: resources

asar: true

files:
  - dist/**/*
  - "!dist/**/*.map"
  - "!dist/**/*.tsbuildinfo"

extraResources:
  - from: resources/models/
    to: models/
    filter:
      - "**/*"

mac:
  target:
    - dmg
  artifactName: Gather-${version}-${arch}.${ext}
  category: public.app-category.photography
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  protocols:
    - name: Gather
      schemes:
        - gather

win:
  target:
    - nsis
  artifactName: Gather-${version}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
