name: CI

on:
  push:
    branches: [main, feat]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@gather/shared
      - name: Typecheck
        run: npx tsc -p desktop/tsconfig.main.json --noEmit && npx tsc -p desktop/tsconfig.renderer.json --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:vitest
